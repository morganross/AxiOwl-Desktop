name: Build Desktop Executable

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build & Package Windows EXE
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build and Package
        run: npm run package:win

      - name: Upload Windows Portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: Qexow-Windows-Portable
          path: dist_electron/Qexow *.exe
          if-no-files-found: error
