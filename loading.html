<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading Qexow...</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      background-color: #0f0f11;
      color: #f0f0f0;
      font-family: 'Inter', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      -webkit-user-select: none;
      user-select: none;
    }

    .container {
      text-align: center;
      opacity: 0;
      transform: translateY(10px);
      animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .logo-container {
      position: relative;
      margin-bottom: 24px;
      display: inline-block;
    }

    .logo-glow {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, rgba(59, 130, 246, 0.25) 0%, rgba(59, 130, 246, 0) 70%);
      filter: blur(8px);
      border-radius: 50%;
      animation: pulse 2s infinite ease-in-out;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      fill: none;
      stroke: #3b82f6;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      position: relative;
      z-index: 1;
    }

    .title {
      font-size: 1.25rem;
      font-weight: 600;
      margin: 0 0 8px 0;
      letter-spacing: -0.02em;
    }

    .status {
      font-size: 0.82rem;
      color: #a0a0a5;
      margin: 0 0 32px 0;
      font-weight: 400;
    }

    .spinner {
      width: 24px;
      height: 24px;
      border: 2px solid rgba(255, 255, 255, 0.05);
      border-top-color: #3b82f6;
      border-radius: 50%;
      display: inline-block;
      animation: spin 0.8s linear infinite;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes pulse {
      0%, 100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.6; }
      50% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo-container">
      <div class="logo-glow"></div>
      <svg class="logo-icon" viewBox="0 0 24 24">
        <polyline points="4 17 10 11 4 5"></polyline>
        <line x1="12" y1="19" x2="20" y2="19"></line>
      </svg>
    </div>
    <div class="title">Qexow Desktop</div>
    <div id="status-text" class="status">Connecting to local server...</div>
    <div class="spinner"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const port = params.get('port') || '3000';
    const statusText = document.getElementById('status-text');

    async function pollServer() {
      try {
        const response = await fetch(`http://localhost:${port}/api/auth/status`);
        if (response.ok) {
          statusText.textContent = "Server online, launching...";
          setTimeout(() => {
            window.location.href = `http://localhost:${port}`;
          }, 300);
          return;
        }
      } catch (err) {
        // Server not ready yet
      }
      setTimeout(pollServer, 300);
    }

    // Start polling
    pollServer();
  </script>
</body>
</html>
